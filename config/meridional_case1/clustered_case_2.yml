metadata:
  name: Case study 2 Tweede Maasvlakte ERA5 Wind Profile Clustering
  description: This dataset contains the results of clustering analysis performed
    on ERA5 reanalysis data for the Tweede Maasvlakte location in the Netherlands.
    The clustering was conducted to identify typical wind profile shapes and their
    probabilities based on the ERA5 data from 2010 to 2020, covering altitudes from
    10 to 500 meters above ground level.
