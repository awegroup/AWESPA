metadata:
  name: 100 kW Meridional system
  description: Config for the 100 kW Meridional soft kite pumping ground gen system
  note: None
  awesIO_version: 0.1.0
  schema: system_schema.yml

assembly:
  connectivity_matrix:
    - [K1, T1]
    - [T2, G1]

components:
  kites:
    - name: V11.140
      type: soft_kite_kcu
      version: 1.0
      joints:
        kcu_joint:
          id: K1
      wing:
        name: V11.140
        type: LEI_soft_kite
        version: 1.0
        structure:
          projected_surface_area: 110.6 # m2
          mass: 47.0 # kg, wing and bridle mass lumped together
      bridle:
        name: V11.140 Bridle
        type: LEI_soft_kite_bridle
        version: 1.0
        structure:
          mass: 0.0
      control_system:
        name: 100 kW Meridional system KCU
        type: kite_control_unit
        version: 1.0
        structure:
          mass: 20.0 # kg

  tethers:
    - name: 100 kW Meridional system Tether
      type: non_conductive_tether
      version: 1.0
      joints:
        upper_tether_joint:
          id: T1
        lower_tether_joint:
          id: T2
      structure:
        length: 600
        diameter: 0.012
        density: 724.0
        max_tether_force: 60000.0 # N
        conductive: false

  ground_station:
    name: 100 kW Meridional system Ground Station
    type: pumping_ground_gen_station
    version: 1.0
    joints:
      drum_joint:
        id: G1
    structure:
      mass: 0.0
    drums:
      - type: electric_winch
        max_tether_speed: 15.0
    generators:
      - type: permanent_magnet_synchronous
        max_power: 180000.0 # W
        efficiency: 0.95
    storages:
      - type: battery_bank
        efficiency: 0.90
